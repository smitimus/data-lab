# dashboard for services
# 251124 - working
# 251219 - standardized: field order, added logging
services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - 80:3000
    volumes:
      - ${CONF}/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
    #  - PUID=${PUID}
    #  - PGID=${PGID}
      - TZ=${TZ}
      - HOMEPAGE_ALLOWED_HOSTS=${IP}
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:3000
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    mem_limit: 512m
    mem_reservation: 256m
    cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
networks: {}
