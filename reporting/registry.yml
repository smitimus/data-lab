  dashboard_title: "Store — Loyalty & Retention"
  kpi_cards:
  - active_rate_pct
  - redemption_rate_pct
  - points_liability
  - tier_upgrades
  datasets_used:
  - mart_loyalty_rfm
  - mart_loyalty_engagement
  - mart_loyalty_cohort
  refresh_cadence: daily (grocery_dbt DAG)
