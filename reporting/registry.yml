  - estimated_annual_turnover
  - stock_aging_category
  datasets_used:
  - mart_inventory_valuation
  - mart_shrinkage_analysis
  - mart_inventory_turnover
  refresh_cadence: daily (grocery_dbt DAG)
- domain: fulfillment_supply_chain
  dashboard_slug: store_supply_chain
  dashboard_title: "Store — Supply Chain & Fulfillment"
  kpi_cards:
  - fill_rate_pct
  - on_time_rate_pct
  - avg_cycle_time
  - pick_accuracy
  datasets_used:
  - mart_supply_chain_kpis
  - mart_order_cycle_time
  - mart_order_fulfillment_funnel
  - mart_fulfillment_pick_accuracy
  refresh_cadence: daily (grocery_dbt DAG)
- domain: transport_fleet
  dashboard_slug: store_transport_fleet
  dashboard_title: "Store — Transport & Fleet"
  kpi_cards:
  - on_time_rate_pct
