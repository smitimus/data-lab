dashboards:
- domain: pos_promotions
  dashboard_slug: store_pos_promotions
  dashboard_title: "Store \u2014 Sales, Promotions & Pricing"
  kpi_cards:
  - total_revenue
  - promo_lift_vs_baseline_pct
  - avg_basket_size
  - coupon_redemption_rate
  - price_elasticity
  datasets_used:
  - mart_daily_revenue
  - mart_category_sales_performance
  - mart_promotion_effectiveness
  - mart_promotion_redemption
  - mart_product_price_elasticity
