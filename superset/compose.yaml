# Apache Superset - Business Intelligence and Data Visualization
# 250106 - initial setup: Superset with PostgreSQL backend
# 260320 - fixed config path, added init service, pinned to stable image
# 260320 - added superset-setup service for auto-provisioning EDW connection + dashboard
# 260320 - consolidated data/ into conf/
# 260321 - added postgres_network to superset-setup for ORM chart→dashboard linking

x-superset-env: &superset-env
  SUPERSET_CONFIG_PATH: /app/superset_home/superset_config.py
  SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  TZ: ${TZ}

services:
  superset-init:
    container_name: superset-init
    image: apache/superset:4.1.2
    environment:
      <<: *superset-env
    volumes:
      - ${CONF}/superset:/app/superset_home
    command:
      - "bash"
      - "-c"
      - |
        pip show psycopg2-binary > /dev/null 2>&1 || pip install --quiet psycopg2-binary
        echo "Waiting for postgres..."
        until python3 -c "
        import psycopg2, os, sys
        try:
            psycopg2.connect(host='postgres', port=5432,
                user=os.environ['POSTGRES_USER'],
                password=os.environ['POSTGRES_PASSWORD'],
                dbname='superset')
            sys.exit(0)
        except Exception:
            sys.exit(1)
        " 2>/dev/null; do sleep 5; done
        echo "Postgres ready. Running db upgrade..."
        superset db upgrade
        superset fab create-admin \
          --username admin --firstname Admin --lastname User \
          --email admin@example.com \
          --password "${SUPERSET_ADMIN_PASSWORD:-admin}" 2>&1 | grep -v "already exists" || true
        echo "Running superset init (this can take 20+ minutes on first run)..."
        superset init
        echo "superset-init complete."
    restart: "no"
    networks:
      - postgres_network

  superset:
    container_name: superset
    image: apache/superset:4.1.2
    environment:
      <<: *superset-env
    volumes:
      - ${CONF}/superset:/app/superset_home
      - ${CONF}/superset/data:/app/superset_data
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    depends_on:
      superset-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always
    labels:
      - homepage.group=${HOMEPAGE_GROUP}
      - homepage.name=Superset
      - homepage.icon=superset.png
      - homepage.href=http://${IP}:${SUPERSET_PORT:-8088}/
      - homepage.description=BI dashboards — admin/admin
    networks:
      - superset_network
      - postgres_network

  superset-setup:
    container_name: superset-setup
    image: apache/superset:4.1.2
    environment:
      <<: *superset-env
      SUPERSET_ADMIN_USERNAME: admin
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
    volumes:
      - ${CONF}/superset:/app/superset_home
    command: ["bash", "-c", "pip install --quiet requests && python /app/superset_home/setup.py"]
    depends_on:
      superset:
        condition: service_healthy
    restart: on-failure
    networks:
      - superset_network
      - postgres_network

networks:
  superset_network:
    driver: bridge
  postgres_network:
    external: true
    name: postgres_postgres_network
