version: 2

models:

  # ── mart_daily_revenue ────────────────────────────────────────────────────
  # Grain: one row per (transaction_date, location_id)

  - name: mart_daily_revenue
    columns:
      - name: transaction_date
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: pos_transaction_count
        tests: [not_null]
      - name: pos_revenue
        tests: [not_null]
      - name: total_revenue
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 7
          max_value: 730
      - dbt_expectations.expect_column_values_to_be_between:
          column_name: total_revenue
          min_value: 0

  # ── mart_department_performance ───────────────────────────────────────────
  # Grain: one row per (transaction_date, location_id, department_id)

  - name: mart_department_performance
    columns:
      - name: transaction_date
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: department_id
        tests:
          - not_null:
              config:
                severity: warn
      - name: gross_revenue
        tests: [not_null]
      - name: net_revenue
        tests: [not_null]
      - name: transaction_count
        tests: [not_null]
      - name: units_sold
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 10
          max_value: 10000

  # ── mart_department_labor ─────────────────────────────────────────────────
  # Grain: one row per (report_date, location_id, department)

  - name: mart_department_labor
    columns:
      - name: report_date
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: department
        tests: [not_null]
      - name: total_shifts
        tests: [not_null]
      - name: scheduled_hours
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_column_values_to_be_between:
          column_name: scheduled_hours
          min_value: 0
      - dbt_expectations.expect_column_values_to_be_between:
          column_name: hours_utilization_pct
          min_value: 0
          max_value: 300
          config:
            severity: warn

  # ── mart_department_shrinkage ─────────────────────────────────────────────
  # Grain: one row per (report_date, location_id, department_id)

  - name: mart_department_shrinkage
    columns:
      - name: report_date
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: department_id
        tests:
          - not_null:
              config:
                severity: warn
      - name: total_value_lost
        tests: [not_null]

  # ── mart_employee_cost ────────────────────────────────────────────────────
  # Grain: one row per (scheduled_date, employee_id)

  - name: mart_employee_cost
    columns:
      - name: scheduled_date
        tests: [not_null]
      - name: employee_id
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: scheduled_hours
        tests: [not_null]
      - name: scheduled_labor_cost
        tests: [not_null]

  # ── mart_employee_productivity ────────────────────────────────────────────
  # Grain: one row per (sale_date, employee_id)

  - name: mart_employee_productivity
    columns:
      - name: sale_date
        tests: [not_null]
      - name: employee_id
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: transaction_count
        tests: [not_null]
      - name: total_revenue_processed
        tests: [not_null]

  # ── mart_inventory_summary ────────────────────────────────────────────────
  # Grain: one row per (product_id, location_id) — stock_id is the PK

  - name: mart_inventory_summary
    columns:
      - name: stock_id
        tests: [unique, not_null]
      - name: product_id
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: quantity_on_hand
        tests: [not_null]
      - name: quantity_available
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 100
          max_value: 10000
      - dbt_expectations.expect_column_values_to_be_between:
          column_name: quantity_on_hand
          min_value: 0

  # ── mart_labor_efficiency ─────────────────────────────────────────────────
  # Grain: one row per (scheduled_date, location_id, department)

  - name: mart_labor_efficiency
    columns:
      - name: scheduled_date
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: department
        tests: [not_null]
      - name: shifts_scheduled
        tests: [not_null]

  # ── mart_location_performance ─────────────────────────────────────────────
  # Grain: one row per location_id (all-time rollup)

  - name: mart_location_performance
    columns:
      - name: location_id
        tests: [unique, not_null]
      - name: total_pos_transactions
        tests: [not_null]
      - name: total_revenue
        tests: [not_null]
      - name: days_with_sales
        tests: [not_null]

  # ── mart_loyalty_cohort ───────────────────────────────────────────────────
  # Grain: one row per member_id

  - name: mart_loyalty_cohort
    columns:
      - name: member_id
        tests: [unique, not_null]
      - name: loyalty_tier
        tests: [not_null]
      - name: points_balance
        tests: [not_null]
      - name: total_spend
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          max_value: 100000

  # ── mart_product_performance ──────────────────────────────────────────────
  # Grain: one row per (transaction_date, location_id, product_id)

  - name: mart_product_performance
    columns:
      - name: transaction_date
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: units_sold
        tests: [not_null]
      - name: gross_revenue
        tests: [not_null]
      - name: net_revenue
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 100
          max_value: 500000
      - dbt_expectations.expect_column_values_to_be_between:
          column_name: gross_revenue
          min_value: 0
      - dbt_expectations.expect_column_values_to_be_between:
          column_name: units_sold
          min_value: 0

  # ── int_pos_sales_enriched ────────────────────────────────────────────────
  # Grain: one row per transaction_item (item_id)

  - name: int_pos_sales_enriched
    columns:
      - name: item_id
        tests: [unique, not_null]
      - name: transaction_id
        tests: [not_null]
      - name: transaction_date
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: line_total
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1000
          max_value: 5000000

  # ── mart_category_sales_performance ───────────────────────────────────────
  # Grain: one row per (transaction_date, location_id, category)

  - name: mart_category_sales_performance
    columns:
      - name: transaction_date
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: category
        tests: [not_null]
      - name: category_revenue
        tests: [not_null]
      - name: category_units
        tests: [not_null]
      - name: avg_basket_size
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 100
          max_value: 100000

  # ── mart_product_price_elasticity ─────────────────────────────────────────
  # Grain: one row per (product_id, sale_month)

  - name: mart_product_price_elasticity
    columns:
      - name: product_id
        tests: [not_null]
      - name: sale_month
        tests: [not_null]
      - name: units_sold
        tests: [not_null]
      - name: effective_price
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 50
          max_value: 100000

  # ── mart_promotion_redemption ─────────────────────────────────────────────
  # Grain: one row per promotion (coupon_id or deal_id)

  - name: mart_promotion_redemption
    columns:
      - name: promotion_id
        tests: [not_null]
      - name: promotion_type
        tests: [not_null, accepted_values: {values: ['coupon', 'combo_deal']}]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          max_value: 1000

  # ── mart_promotion_effectiveness ──────────────────────────────────────────
  # Grain: one row per (ad_week_start, ad_week_end, ad_name, product_id, is_ad_item,
  #         discount_pct, promoted_price)

  - name: mart_promotion_effectiveness
    columns:
      - name: ad_week_start
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: is_ad_item
        tests: [not_null]
      - name: total_units_sold
        tests: [not_null]
      - name: total_revenue
        tests: [not_null]
      - name: promo_lift_vs_baseline_pct
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          max_value: 200000

  # ── mart_shrink_analysis ──────────────────────────────────────────────────
  # Grain: one row per (event_date, location_id, product_id, shrinkage_type)

  - name: mart_shrink_analysis
    columns:
      - name: event_date
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: shrinkage_type
        tests: [not_null]
      - name: total_value_lost
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          max_value: 200000
      - dbt_expectations.expect_column_values_to_be_in_set:
          column_name: shrinkage_type
          value_set: ['damaged', 'expired', 'spoilage', 'theft']

  # ── int_inventory_daily_snapshot ──────────────────────────────────────────
  # Grain: one row per (product_id, location_id, snapshot_date)

  - name: int_inventory_daily_snapshot
    columns:
      - name: product_id
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: snapshot_date
        tests: [not_null]
      - name: quantity_on_hand
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 100
          max_value: 1000000

  # ── int_shrinkage_attributed ──────────────────────────────────────────────
  # Grain: one row per shrinkage event (event_id)

  - name: int_shrinkage_attributed
    columns:
      - name: event_id
        tests: [unique, not_null]
      - name: product_id
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: event_date
        tests: [not_null]
      - name: shrinkage_type
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          max_value: 300000

  # ── mart_inventory_valuation ──────────────────────────────────────────────
  # Grain: one row per (location_id, department_id)

  - name: mart_inventory_valuation
    columns:
      - name: location_id
        tests: [not_null]
      - name: department_id
        tests: [not_null]
      - name: value_on_hand_cost
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          max_value: 10000
      - dbt_expectations.expect_column_values_to_be_between:
          column_name: value_on_hand_cost
          min_value: 0

  # ── mart_shrinkage_analysis ───────────────────────────────────────────────
  # Grain: one row per (event_date, location_id, department_id, category, shrinkage_type)
  # NOTE: distinct from mart_shrink_analysis (product-level). This is the corrected
  # department/category/cause rollup using stg_pos_products.department_id.

  - name: mart_shrinkage_analysis
    columns:
      - name: event_date
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: department_id
        tests: [not_null]
      - name: category
        tests: [not_null]
      - name: shrinkage_type
        tests: [not_null]
      - name: total_value_lost
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          max_value: 300000
      - dbt_expectations.expect_column_values_to_be_in_set:
          column_name: shrinkage_type
          value_set: ['damaged', 'expired', 'spoilage', 'theft']

  # ── mart_inventory_turnover (extended with margin context) ────────────────
  # Grain: one row per (product_id, location_id) — store only

  - name: mart_inventory_turnover
    columns:
      - name: product_id
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: location_name
        tests: [not_null]
      - name: quantity_on_hand
        tests: [not_null]
      - name: quantity_available
        tests: [not_null]
      - name: units_sold_30d
        tests: [not_null]
      - name: stock_aging_category
        tests:
          - not_null
          - accepted_values:
              values: ['OUT_OF_STOCK', 'DEAD_STOCK', 'OVERSTOCKED', 'REORDER_NEEDED', 'NO_RECEIPT_HISTORY', 'HEALTHY']
      - name: unit_cost
      - name: unit_price
      - name: margin_pct
      - name: gross_margin_proxy
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 100
          max_value: 10000

  # ── mart_supply_chain_summary ─────────────────────────────────────────────
  # Grain: one row per order_id

  - name: mart_supply_chain_summary
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: order_date
        tests: [not_null]
      - name: store_location_id
        tests: [not_null]
      - name: order_status
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 10
          max_value: 10000

  # ── mart_hourly_sales_pattern ─────────────────────────────────────────────
  # Grain: one row per (hour_of_day, day_of_week, location_id)

  - name: mart_hourly_sales_pattern
    columns:
      - name: hour_of_day
        tests: [not_null]
      - name: day_of_week
        tests: [not_null]
      - name: day_name
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: transaction_count
        tests: [not_null]
      - name: total_revenue
        tests: [not_null]
      - name: revenue_rank
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 24
          max_value: 10000

  # ── mart_delivery_performance ─────────────────────────────────────────────
  # Grain: one row per (report_week_start, warehouse_location_id)

  - name: mart_delivery_performance
    columns:
      - name: report_week_start
        tests: [not_null]
      - name: warehouse_location_id
        tests: [not_null]
      - name: total_orders
        tests: [not_null]
      - name: fulfilled_count
        tests: [not_null]
      - name: delivered_count
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          max_value: 52

  # ── mart_store_weekly_summary ─────────────────────────────────────────────
  # Grain: one row per (report_week_start, location_id)

  - name: mart_store_weekly_summary
    columns:
      - name: week_start
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: location_name
        tests: [not_null]
      - name: transaction_count
        tests: [not_null]
      - name: total_revenue
        tests: [not_null]
      - name: below_reorder_count
        tests: [not_null]
      - name: out_of_stock_count
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          max_value: 500

  # ── mart_transport_load_summary ───────────────────────────────────────────
  # Grain: one row per load_id

  - name: mart_transport_load_summary
    columns:
      - name: load_id
        tests: [unique, not_null]
      - name: truck_id
        tests: [not_null]
      - name: driver
        tests: [not_null]
      - name: warehouse_name
        tests: [not_null]
      - name: store_name
        tests: [not_null]
      - name: load_date
        tests: [not_null]
      - name: status
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_column_values_to_be_in_set:
          column_name: status
          value_set: ['scheduled', 'in_transit', 'delivered', 'cancelled']

  # ── mart_fleet_utilization ───────────────────────────────────────────────
  # Grain: one row per truck

  - name: mart_fleet_utilization
    columns:
      - name: truck_id
        tests: [unique, not_null]
      - name: license_plate
        tests: [unique, not_null]
      - name: total_loads
        tests: [not_null]
      - name: utilization_status
        tests:
          - not_null
          - accepted_values:
              values: ['ACTIVE', 'IDLE', 'INACTIVE']
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          max_value: 50

  # ── mart_transport_daily_metrics ──────────────────────────────────────────
  # Grain: one row per (load_date, warehouse_location_id)

  - name: mart_transport_daily_metrics
    columns:
      - name: load_date
        tests: [not_null]
      - name: warehouse_location_id
        tests: [not_null]
      - name: total_loads
        tests: [not_null]
      - name: completed_loads
        tests: [not_null]

  # ── mart_attendance_summary ───────────────────────────────────────────────
  # Grain: one row per (employee_id, event_date)

  - name: mart_attendance_summary
    columns:
      - name: employee_id
        tests: [not_null]
      - name: event_date
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: clock_in_at
      - name: clock_out_at
      - name: total_clocked_hours
      - name: net_hours_worked
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          max_value: 100000

  # ── mart_daily_attendance_stats ──────────────────────────────────────────
  # Grain: one row per (event_date, location_id)

  - name: mart_daily_attendance_stats
    columns:
      - name: event_date
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: employees_present
        tests: [not_null]
      - name: total_net_hours
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          max_value: 10000

  # ── mart_employee_hours_vs_schedule ──────────────────────────────────────
  # Grain: one row per (employee_id, event_date)

  - name: mart_employee_hours_vs_schedule
    columns:
      - name: report_date
        tests: [not_null]
      - name: employee_id
        tests: [not_null]
      - name: full_name
        tests: [not_null]
      - name: department
      - name: scheduled_hours
      - name: net_hours_worked
      - name: attendance_status
        tests:
          - not_null
          - accepted_values:
              values: ['ATTENDED', 'SHORT', 'PARTIAL', 'NO_SHOW', 'UNSCHEDULED', 'UNKNOWN']
      - name: hours_attainment_pct

  # ── mart_fulfillment_operations ──────────────────────────────────────────
  # Grain: one row per fulfillment_id

  - name: mart_fulfillment_operations
    columns:
      - name: fulfillment_id
        tests: [unique, not_null]
      - name: store_order_id
        tests: [not_null]
      - name: warehouse_location_id
        tests: [not_null]
      - name: fulfillment_status
        tests: [not_null]
      - name: total_qty_requested
        tests: [not_null]
      - name: total_qty_picked
        tests: [not_null]

  # ── mart_fulfillment_pick_accuracy ───────────────────────────────────────
  # Grain: one row per fulfillment_id

  - name: mart_fulfillment_pick_accuracy
    columns:
      - name: fulfillment_id
        tests: [unique, not_null]
      - name: total_line_items
        tests: [not_null]
      - name: total_qty_requested
        tests: [not_null]
      - name: total_qty_picked
        tests: [not_null]
      - name: avg_fill_rate_pct
      - name: total_fill_rate_pct
      - name: is_perfect_order
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          max_value: 10000

  # ── mart_daily_fulfillment_summary ───────────────────────────────────────
  # Grain: one row per (report_date, warehouse_location_id)

  - name: mart_daily_fulfillment_summary
    columns:
      - name: report_date
        tests: [not_null]
      - name: warehouse_location_id
        tests: [not_null]
      - name: total_orders
        tests: [not_null]
      - name: completed_orders
      - name: total_items_picked
        tests: [not_null]
      - name: daily_fill_rate_pct
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          max_value: 10000

  # ── mart_order_fulfillment_funnel ────────────────────────────────────────
  # Grain: one row per store_order_id

  - name: mart_order_fulfillment_funnel
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: order_date
        tests: [not_null]
      - name: store_location_id
        tests: [not_null]
      - name: order_status
        tests: [not_null]
      - name: pipeline_stage
        tests: [not_null]
      - name: days_order_to_fulfill
      - name: days_order_to_delivery

  # ── int_hr_labor_enriched ─────────────────────────────────────────────────
  # Grain: one row per (employee_id, scheduled_date, location_id)

  - name: int_hr_labor_enriched
    columns:
      - name: employee_id
        tests: [not_null]
      - name: scheduled_date
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: employee_cost
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          max_value: 100000

  # ── mart_labor_cost_by_department ─────────────────────────────────────────
  # Grain: one row per (report_date, location_id, department)

  - name: mart_labor_cost_by_department
    columns:
      - name: report_date
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: department
        tests: [not_null]
      - name: actual_cost
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          max_value: 10000

  # ── mart_attendance_compliance ────────────────────────────────────────────
  # Grain: one row per (report_date, location_id, department)

  - name: mart_attendance_compliance
    columns:
      - name: report_date
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: department
        tests: [not_null]
      - name: scheduled_shifts
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          max_value: 10000
      - dbt_expectations.expect_column_values_to_be_between:
          column_name: no_show_rate_pct
          min_value: 0
          max_value: 100
      - dbt_expectations.expect_column_values_to_be_between:
          column_name: late_arrival_rate_pct
          min_value: 0
          max_value: 100
