version: 2

models:

  # ── mart_daily_revenue ────────────────────────────────────────────────────
  # Grain: one row per (transaction_date, location_id)

  - name: mart_daily_revenue
    columns:
      - name: transaction_date
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: pos_transaction_count
        tests: [not_null]
      - name: pos_revenue
        tests: [not_null]
      - name: total_revenue
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 7
          max_value: 730
      - dbt_expectations.expect_column_values_to_be_between:
          column_name: total_revenue
          min_value: 0

  # ── mart_department_performance ───────────────────────────────────────────
  # Grain: one row per (transaction_date, location_id, department_id)

  - name: mart_department_performance
    columns:
      - name: transaction_date
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: department_id
        tests: [not_null]
      - name: gross_revenue
        tests: [not_null]
      - name: net_revenue
        tests: [not_null]
      - name: transaction_count
        tests: [not_null]
      - name: units_sold
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 10
          max_value: 10000

  # ── mart_department_labor ─────────────────────────────────────────────────
  # Grain: one row per (report_date, location_id, department)

  - name: mart_department_labor
    columns:
      - name: report_date
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: department
        tests: [not_null]
      - name: total_shifts
        tests: [not_null]
      - name: scheduled_hours
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_column_values_to_be_between:
          column_name: scheduled_hours
          min_value: 0
          config:
            severity: warn
      - dbt_expectations.expect_column_values_to_be_between:
          column_name: hours_utilization_pct
          min_value: 0
          max_value: 300
          config:
            severity: warn

  # ── mart_department_shrinkage ─────────────────────────────────────────────
  # Grain: one row per (report_date, location_id, department_id)

  - name: mart_department_shrinkage
    columns:
      - name: report_date
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: department_id
        tests: [not_null]
      - name: total_value_lost
        tests: [not_null]

  # ── mart_employee_cost ────────────────────────────────────────────────────
  # Grain: one row per (scheduled_date, employee_id)

  - name: mart_employee_cost
    columns:
      - name: scheduled_date
        tests: [not_null]
      - name: employee_id
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: scheduled_hours
        tests: [not_null]
      - name: scheduled_labor_cost
        tests: [not_null]

  # ── mart_employee_productivity ────────────────────────────────────────────
  # Grain: one row per (sale_date, employee_id)

  - name: mart_employee_productivity
    columns:
      - name: sale_date
        tests: [not_null]
      - name: employee_id
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: transaction_count
        tests: [not_null]
      - name: total_revenue_processed
        tests: [not_null]

  # ── mart_inventory_summary ────────────────────────────────────────────────
  # Grain: one row per (product_id, location_id) — stock_id is the PK

  - name: mart_inventory_summary
    columns:
      - name: stock_id
        tests: [unique, not_null]
      - name: product_id
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: quantity_on_hand
        tests: [not_null]
      - name: quantity_available
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 100
          max_value: 10000
      - dbt_expectations.expect_column_values_to_be_between:
          column_name: quantity_on_hand
          min_value: 0

  # ── mart_labor_efficiency ─────────────────────────────────────────────────
  # Grain: one row per (scheduled_date, location_id, department)

  - name: mart_labor_efficiency
    columns:
      - name: scheduled_date
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: department
        tests: [not_null]
      - name: shifts_scheduled
        tests: [not_null]

  # ── mart_location_performance ─────────────────────────────────────────────
  # Grain: one row per location_id (all-time rollup)

  - name: mart_location_performance
    columns:
      - name: location_id
        tests: [unique, not_null]
      - name: total_pos_transactions
        tests: [not_null]
      - name: total_revenue
        tests: [not_null]
      - name: days_with_sales
        tests: [not_null]

  # ── mart_loyalty_cohort ───────────────────────────────────────────────────
  # Grain: one row per member_id

  - name: mart_loyalty_cohort
    columns:
      - name: member_id
        tests: [unique, not_null]
      - name: loyalty_tier
        tests: [not_null]
      - name: points_balance
        tests: [not_null]
      - name: total_spend
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          max_value: 100000

  # ── mart_product_performance ──────────────────────────────────────────────
  # Grain: one row per (transaction_date, location_id, product_id)

  - name: mart_product_performance
    columns:
      - name: transaction_date
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: units_sold
        tests: [not_null]
      - name: gross_revenue
        tests: [not_null]
      - name: net_revenue
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 100
          max_value: 100000
      - dbt_expectations.expect_column_values_to_be_between:
          column_name: gross_revenue
          min_value: 0
      - dbt_expectations.expect_column_values_to_be_between:
          column_name: units_sold
          min_value: 0

  # ── mart_promotion_effectiveness ──────────────────────────────────────────
  # Grain: one row per (ad_week_start, product_id, is_ad_item)

  - name: mart_promotion_effectiveness
    columns:
      - name: ad_week_start
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: is_ad_item
        tests: [not_null]
      - name: total_units_sold
        tests: [not_null]
      - name: total_revenue
        tests: [not_null]

  # ── mart_shrink_analysis ──────────────────────────────────────────────────
  # Grain: one row per (event_date, location_id, product_id, shrinkage_type)

  - name: mart_shrink_analysis
    columns:
      - name: event_date
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: shrinkage_type
        tests: [not_null]
      - name: total_value_lost
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 10
          max_value: 50000
      - dbt_expectations.expect_column_values_to_be_in_set:
          column_name: shrinkage_type
          value_set: ['damaged', 'expired', 'spoilage', 'theft']

  # ── mart_supply_chain_summary ─────────────────────────────────────────────
  # Grain: one row per order_id

  - name: mart_supply_chain_summary
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: order_date
        tests: [not_null]
      - name: store_location_id
        tests: [not_null]
      - name: order_status
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 10
          max_value: 10000

  # ── mart_inventory_turnover ───────────────────────────────────────────────
  # Grain: one row per (product_id, location_id) — store only

  - name: mart_inventory_turnover
    columns:
      - name: product_id
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: location_name
        tests: [not_null]
      - name: quantity_on_hand
        tests: [not_null]
      - name: quantity_available
        tests: [not_null]
      - name: units_sold_30d
        tests: [not_null]
      - name: stock_aging_category
        tests:
          - not_null
          - accepted_values:
              values: ['OUT_OF_STOCK', 'DEAD_STOCK', 'OVERSTOCKED', 'REORDER_NEEDED', 'NO_RECEIPT_HISTORY', 'HEALTHY']
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 100
          max_value: 10000

  # ── mart_hourly_sales_pattern ─────────────────────────────────────────────
  # Grain: one row per (hour_of_day, day_of_week, location_id)

  - name: mart_hourly_sales_pattern
    columns:
      - name: hour_of_day
        tests: [not_null]
      - name: day_of_week
        tests: [not_null]
      - name: day_name
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: transaction_count
        tests: [not_null]
      - name: total_revenue
        tests: [not_null]
      - name: revenue_rank
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 24
          max_value: 10000

  # ── mart_delivery_performance ─────────────────────────────────────────────
  # Grain: one row per (report_week_start, warehouse_location_id)

  - name: mart_delivery_performance
    columns:
      - name: report_week_start
        tests: [not_null]
      - name: warehouse_location_id
        tests: [not_null]
      - name: total_orders
        tests: [not_null]
      - name: fulfilled_count
        tests: [not_null]
      - name: delivered_count
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          max_value: 52

  # ── mart_store_weekly_summary ─────────────────────────────────────────────
  # Grain: one row per (report_week_start, location_id)

  - name: mart_store_weekly_summary
    columns:
      - name: week_start
        tests: [not_null]
      - name: location_id
        tests: [not_null]
      - name: location_name
        tests: [not_null]
      - name: transaction_count
        tests: [not_null]
      - name: total_revenue
        tests: [not_null]
      - name: below_reorder_count
        tests: [not_null]
      - name: out_of_stock_count
        tests: [not_null]
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          max_value: 500
