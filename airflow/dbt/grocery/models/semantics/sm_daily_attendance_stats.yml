# Semantic model: daily_attendance_stats

semantic_models:
- name: daily_attendance_stats
  model: ref('mart_daily_attendance_stats')
  entities:
  - name: daily_attendance_stats
    type: primary
    expr: location_id
  measures:
  - name: employees_present
    agg: sum
    agg_time_dimension: event_date
  - name: daily_attendance_stats_total_clocked_hours
    agg: sum
    agg_time_dimension: event_date
  - name: total_net_hours
    agg: sum
    agg_time_dimension: event_date
  - name: daily_attendance_stats_total_break_hours
    agg: sum
    agg_time_dimension: event_date
  dimensions:
  - name: event_date
    type: time
    type_params:
      time_granularity: day
  - name: location_name
    type: categorical
