# Metrics file

metrics:
- name: total_labor_cost
  label: Total Labor Cost
  type: simple
  type_params:
    measure: actual_cost
- name: total_scheduled_labor_cost
  label: Total Scheduled Labor Cost
  type: simple
  type_params:
    measure: scheduled_cost
- name: total_hours_worked
  label: Total Hours Worked
  type: simple
  type_params:
    measure: employee_hours_vs_schedule_net_hours_worked
- name: total_scheduled_hours
  label: Total Scheduled Hours
  type: simple
  type_params:
    measure: employee_hours_vs_schedule_scheduled_hours
- name: employees_present
  label: Employees Present
  type: simple
  type_params:
    measure: employees_present
- name: total_shifts
  label: Total Shifts
  type: simple
  type_params:
    measure: total_shifts
- name: completed_shifts
  label: Completed Shifts
  type: simple
  type_params:
    measure: completed_shifts
- name: no_show_shifts
  label: No-Show Shifts
  type: simple
  type_params:
    measure: no_show_shifts
- name: revenue_processed
  label: Revenue Processed by Employees
  type: simple
  type_params:
    measure: total_revenue_processed
- name: attendance_rate
  label: Attendance Rate
  description: Completed shifts as a fraction of total shifts
  type: ratio
  type_params:
    numerator: completed_shifts
    denominator: total_shifts
- name: no_show_rate
  label: No-Show Rate
  description: No-show shifts as a fraction of total shifts
  type: ratio
  type_params:
    numerator: no_show_shifts
    denominator: total_shifts
- name: schedule_attainment_rate
  label: Schedule Attainment Rate
  description: Hours worked vs. scheduled hours
  type: ratio
  type_params:
    numerator: total_hours_worked
    denominator: total_scheduled_hours
- name: labor_cost_variance
  label: Labor Cost Variance
  description: Actual vs. scheduled labor cost
  type: ratio
  type_params:
    numerator: total_labor_cost
    denominator: total_scheduled_labor_cost
- name: ytd_labor_cost
  label: Year-to-Date Labor Cost
  type: cumulative
  type_params:
    measure: actual_cost
    grain_to_date: year
