# Semantic model: product_performance

semantic_models:
- name: product_performance
  model: ref('mart_product_performance')
  entities:
  - name: product_performance
    type: primary
    expr: location_id
  - name: product
    type: foreign
    expr: product_id
  measures:
  - name: product_performance_units_sold
    agg: sum
    agg_time_dimension: transaction_date
    expr: units_sold
  - name: product_performance_gross_revenue
    agg: sum
    agg_time_dimension: transaction_date
    expr: gross_revenue
  - name: product_performance_total_discounts
    agg: sum
    agg_time_dimension: transaction_date
    expr: total_discounts
  - name: product_performance_net_revenue
    agg: sum
    agg_time_dimension: transaction_date
    expr: net_revenue
  - name: product_performance_transaction_count
    agg: sum
    agg_time_dimension: transaction_date
    expr: transaction_count
  - name: total_cost
    agg: sum
    agg_time_dimension: transaction_date
  - name: gross_profit
    agg: sum
    agg_time_dimension: transaction_date
  dimensions:
  - name: transaction_date
    type: time
    type_params:
      time_granularity: day
  - name: location_name
    type: categorical
  - name: product_name
    type: categorical
  - name: department_name
    type: categorical
  - name: category
    type: categorical
  - name: subcategory
    type: categorical
