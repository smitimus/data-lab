# Semantic model: employee_productivity

semantic_models:
- name: employee_productivity
  model: ref('mart_employee_productivity')
  entities:
  - name: employee_productivity
    type: primary
    expr: employee_id
  - name: location
    type: foreign
    expr: location_id
  measures:
  - name: employee_productivity_transaction_count
    agg: sum
    agg_time_dimension: sale_date
  - name: total_revenue_processed
    agg: sum
    agg_time_dimension: sale_date
  - name: employee_productivity_estimated_labor_cost
    agg: sum
    agg_time_dimension: sale_date
  dimensions:
  - name: sale_date
    type: time
    type_params:
      time_granularity: day
  - name: full_name
    type: categorical
  - name: department
    type: categorical
  - name: job_title
    type: categorical
  - name: location_name
    type: categorical
