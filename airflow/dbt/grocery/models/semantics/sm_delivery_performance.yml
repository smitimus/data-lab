# Semantic model: delivery_performance

semantic_models:
- name: delivery_performance
  model: ref('mart_delivery_performance')
  entities:
  - name: delivery_performance
    type: primary
    expr: warehouse_location_id
  measures:
  - name: delivery_performance_total_orders
    agg: sum
    agg_time_dimension: report_week_start
    expr: total_orders
  - name: total_fulfillments
    agg: sum
    agg_time_dimension: report_week_start
  - name: delivery_performance_total_loads
    agg: sum
    agg_time_dimension: report_week_start
    expr: total_loads
  - name: fulfilled_count
    agg: sum
    agg_time_dimension: report_week_start
  - name: fulfilled_within_24h
    agg: sum
    agg_time_dimension: report_week_start
  - name: delivered_count
    agg: sum
    agg_time_dimension: report_week_start
  - name: delivery_performance_avg_hours_to_fulfill
    agg: average
    agg_time_dimension: report_week_start
    expr: avg_hours_to_fulfill
  - name: avg_hours_in_transit
    agg: average
    agg_time_dimension: report_week_start
  dimensions:
  - name: report_week_start
    type: time
    type_params:
      time_granularity: week
  - name: warehouse_name
    type: categorical
