# Metrics file
# Simple metrics are active. Ratio/derived/cumulative/conversion metrics
# are commented out pending simple metric wrapper additions.

metrics:
  - name: total_members
    label: Total Loyalty Members
    type: simple
    type_params:
      measure: member_count
  - name: total_lifetime_spend
    label: Total Lifetime Spend
    description: Total spend across all loyalty members
    type: simple
    type_params:
      measure: total_spend
  - name: total_points_balance
    label: Total Points Balance
    type: simple
    type_params:
      measure: points_balance
  - name: total_lifetime_points_earned
    label: Total Lifetime Points Earned
    type: simple
    type_params:
      measure: lifetime_points_earned
  - name: loyalty_transactions
    label: Loyalty Transactions
    type: simple
    type_params:
      measure: total_transactions

