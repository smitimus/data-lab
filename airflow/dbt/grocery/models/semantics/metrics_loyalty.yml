# Metrics file

metrics:
- name: total_members
  label: Total Loyalty Members
  type: simple
  type_params:
    measure: member_count
- name: total_lifetime_spend
  label: Total Lifetime Spend
  type: simple
  type_params:
    measure: total_spend
- name: total_points_balance
  label: Total Points Balance
  type: simple
  type_params:
    measure: points_balance
- name: total_lifetime_points_earned
  label: Total Lifetime Points Earned
  type: simple
  type_params:
    measure: lifetime_points_earned
- name: loyalty_transactions
  label: Loyalty Transactions
  type: simple
  type_params:
    measure: total_transactions
- name: avg_lifetime_value
  label: Average Lifetime Value
  description: Average total spend per loyalty member
  type: ratio
  type_params:
    numerator: total_lifetime_spend
    denominator: total_members
- name: avg_points_per_member
  label: Average Points per Member
  type: ratio
  type_params:
    numerator: total_points_balance
    denominator: total_members
- name: avg_loyalty_transaction_value
  label: Avg Loyalty Transaction Value
  type: ratio
  type_params:
    numerator: total_lifetime_spend
    denominator: loyalty_transactions
