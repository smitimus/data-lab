# Metrics file

metrics:
- name: current_stock_on_hand
  label: Current Stock On Hand
  type: simple
  type_params:
    measure: inventory_summary_quantity_on_hand
- name: current_stock_available
  label: Current Stock Available
  type: simple
  type_params:
    measure: inventory_summary_quantity_available
- name: units_sold_30d
  label: Units Sold (30 Days)
  type: simple
  type_params:
    measure: units_sold_30d
- name: shrink_value
  label: Shrink Value
  description: Total dollar value lost to shrinkage
  type: simple
  type_params:
    measure: shrink_analysis_total_value_lost
- name: shrink_quantity
  label: Shrink Quantity
  type: simple
  type_params:
    measure: total_quantity_lost
- name: shrink_events
  label: Shrink Events
  type: simple
  type_params:
    measure: event_count
- name: expired_shrink_value
  label: Expired Shrink Value
  type: simple
  type_params:
    measure: expired_value_lost
- name: spoilage_shrink_value
  label: Spoilage Shrink Value
  type: simple
  type_params:
    measure: spoilage_value_lost
- name: damaged_shrink_value
  label: Damaged Shrink Value
  type: simple
  type_params:
    measure: damaged_value_lost
- name: theft_shrink_value
  label: Theft Shrink Value
  type: simple
  type_params:
    measure: theft_value_lost
- name: ytd_shrink_value
  label: Year-to-Date Shrink Value
  type: cumulative
  type_params:
    measure: shrink_analysis_total_value_lost
    grain_to_date: year
