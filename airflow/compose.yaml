# Apache Airflow Docker Compose Configuration
# Based on official 3.1.3 template, customized for this project structure
# 260320 - added JWT secret, dbt profiles dir, fixed load examples; chmod dbt in init
# 260320 - added docker.io + /var/run/docker.sock for Meltano docker exec trigger (Phase 2)
# 260320 - moved dags + dbt mounts to stacks/ for self-contained redeployment
# 260320 - consolidated data/ into conf/ (single runtime directory)
#
# This configuration uses:
# - CeleryExecutor for distributed task execution
# - PostgreSQL for metadata database
# - Redis for message broker
# - Standardized paths using ${CONF}
# - Environment variables from .env file (auto-read by Docker Compose)
# - Custom Dockerfile with dbt support

x-airflow-common:
  # In order to add custom dependencies or upgrade provider distributions you can use your extended image.
  # We use a custom Dockerfile to include dbt and other packages
  # If build fails, uncomment the image line below and comment out the build section
  &a1
  build:
    context: .
    dockerfile: Dockerfile
  # Fallback: Use pre-built image if build fails (uncomment to use)
  # image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.1.3}
  environment: &a3
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CELERY__CELERY_CONFIG_OPTIONS: airflow.providers.celery.executors.default_celery.DEFAULT_CELERY_CONFIG
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__WEBSERVER__JWT_SECRET: ${AIRFLOW_JWT_SECRET}
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    AIRFLOW__CORE__LOGGING_LEVEL: INFO
    IP: ${IP}
    AIRFLOW__WEBSERVER__BASE_URL: http://${IP}:${AIRFLOW_PORT:-8080}
    AIRFLOW__LOGGING__LOG_URL: http://${IP}:${AIRFLOW_PORT:-8080}/log/{{ dag_id
      }}/{{ task_id }}/{{ execution_date }}/{{ try_number }}.log
    AIRFLOW_CONFIG: /opt/airflow/config/airflow.cfg
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
    DBT_PROFILES_DIR: /opt/airflow/dbt
    TZ: ${TZ}
  volumes:
    - ./dags:/opt/airflow/dags
    - ${CONF}/airflow/logs:/opt/airflow/logs
    - ${CONF}/airflow/config:/opt/airflow/config
    - ${CONF}/airflow/plugins:/opt/airflow/plugins
    - ${CONF}/airflow/data:/opt/airflow/data
    - ./dbt:/opt/airflow/dbt
    - /var/run/docker.sock:/var/run/docker.sock
  user: ${AIRFLOW_UID:-${PUID:-50000}}:0
  group_add:
    - "${DOCKER_GID:-995}"  # docker group — allows docker exec via the mounted socket
  depends_on: &a2
    redis:
      condition: service_healthy
services:
  redis:
    container_name: airflow-redis
    image: redis:7.2-bookworm
    environment:
      TZ: ${TZ}
    expose:
      - 6379
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always
    networks:
      - airflow_network
      - postgres_network
  airflow-apiserver:
    <<: *a1
    container_name: airflow-apiserver
    command: api-server
    ports:
      - ${AIRFLOW_PORT:-8080}:8080
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - http://localhost:8080/api/v2/version
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *a2
      airflow-init:
        condition: service_completed_successfully
    labels:
      - homepage.group=${HOMEPAGE_GROUP}
      - homepage.name=Airflow
      - homepage.icon=airflow.png
      - homepage.href=http://${IP}:${AIRFLOW_PORT:-8080}/
      - homepage.description=Workflow orchestration — admin/admin
    networks:
      - airflow_network
      - postgres_network
  airflow-scheduler:
    <<: *a1
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - http://localhost:8974/health
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *a2
      airflow-init:
        condition: service_completed_successfully
    networks:
      - airflow_network
      - postgres_network
  airflow-dag-processor:
    <<: *a1
    container_name: airflow-dag-processor
    command: dag-processor
    healthcheck:
      test:
        - CMD-SHELL
        - airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *a2
      airflow-init:
        condition: service_completed_successfully
    networks:
      - airflow_network
      - postgres_network
  airflow-worker:
    <<: *a1
    container_name: airflow-worker
    command: celery worker
    healthcheck:
      test:
        - CMD-SHELL
        - celery --app airflow.providers.celery.executors.celery_executor.app
          inspect ping -d "celery@$${HOSTNAME}" || celery --app
          airflow.executors.celery_executor.app inspect ping -d
          "celery@$${HOSTNAME}"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *a3
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *a2
      airflow-apiserver:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    networks:
      - airflow_network
      - postgres_network
  airflow-triggerer:
    <<: *a1
    container_name: airflow-triggerer
    command: triggerer
    healthcheck:
      test:
        - CMD-SHELL
        - airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *a2
      airflow-init:
        condition: service_completed_successfully
    networks:
      - airflow_network
      - postgres_network
  airflow-init:
    <<: *a1
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - >
        set -e

        echo "Starting Airflow initialization..."

        if [[ -z "${AIRFLOW_UID}" ]]; then
          echo "WARNING: AIRFLOW_UID not set, using default"
          export AIRFLOW_UID=$${AIRFLOW_UID:-50000}
        fi

        echo "AIRFLOW_UID: $${AIRFLOW_UID}"

        echo

        echo "Creating required directories..."

        mkdir -p /opt/airflow/{logs,dags,plugins,config}

        echo

        echo "Checking Airflow installation..."

        /entrypoint airflow version || echo "Warning: airflow version check failed"

        echo

        echo "Initializing database..."

        /entrypoint airflow db migrate || /entrypoint airflow db init || echo "Warning: database init may have failed"

        echo

        echo "Setting file ownership to $${AIRFLOW_UID}:0..."

        chown -R "$${AIRFLOW_UID}:0" /opt/airflow/ || echo "Warning: chown failed"

        chown -R "$${AIRFLOW_UID}:0" /opt/airflow/{logs,dags,plugins,config} || echo "Warning: chown failed"

        echo

        echo "Fixing dbt directory permissions..."

        chmod -R 777 /opt/airflow/dbt || echo "Warning: chmod dbt failed (may not be mounted yet)"

        echo

        echo "Initialization complete!"
    environment:
      <<: *a3
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ""
    user: 0:0
    networks:
      - airflow_network
      - postgres_network
  airflow-cli:
    <<: *a1
    container_name: airflow-cli
    profiles:
      - debug
    environment:
      <<: *a3
      CONNECTION_CHECK_MAX_COUNT: "0"
    command:
      - bash
      - -c
      - airflow
    depends_on:
      <<: *a2
    networks:
      - airflow_network
      - postgres_network
volumes: {}
networks:
  airflow_network:
    driver: bridge
  postgres_network:
    external: true
    name: postgres_postgres_network
